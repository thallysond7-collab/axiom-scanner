<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom Scanner</title>
  <style>
    body { margin:0; font-family:system-ui; background:#03050d; color:#aac0d8; }
    .root { min-height:100vh; padding:15px; background:#03050d; }
    .logo { font-size:24px; font-weight:900; background:linear-gradient(90deg,#00ffaa,#00ccff); -webkit-background-clip:text; color:transparent; }
    .live { color:#00ff88; font-size:15px; margin:8px 0 15px; }
    .row { background:#0a0f1e; padding:14px; border-radius:10px; margin:8px 0; display:flex; justify-content:space-between; align-items:center; }
    .error { background:#200810; color:#ff6688; padding:15px; border-radius:10px; margin:15px 0; }
    button { background:#0066ff; color:white; border:none; padding:14px; border-radius:8px; font-size:16px; width:100%; margin-top:10px; }
  </style>
</head>
<body>
  <div class="root">
    <h1 class="logo">◈ AXIOM SCANNER</h1>
    <p class="live">● LIVE • SOLANA</p>

    <div id="content"></div>

    <button onclick="loadData()">↺ Atualizar Dados</button>
  </div>

  <script>
    // Dados Mock (sempre funcionam)
    const mockData = [
      {symbol: "MOONCAT", mc: 12400, change: 145.3},
      {symbol: "PUMPFUN", mc: 45800, change: 87.6},
      {symbol: "SOLBULL", mc: 67200, change: 234.1},
      {symbol: "CHADCOIN", mc: 89500, change: -12.4},
      {symbol: "GEMX", mc: 145000, change: 67.8},
      {symbol: "VIRAL", mc: 28900, change: 312.5},
      {symbol: "DOGE2", mc: 67300, change: 45.9},
    ];

    function loadData() {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="error">Carregando dados reais...</div>`;

      // Mostra os dados mock imediatamente
      let html = '';
      mockData.forEach(item => {
        html += `
          <div class="row">
            <div>
              <strong>${item.symbol}</strong><br>
              <small>MC ${item.mc >= 100000 ? '$'+(item.mc/1000).toFixed(0)+'K' : '$'+item.mc}</small>
            </div>
            <div style="text-align:right; color:${item.change > 0 ? '#00ff88' : '#ff3355'}">
              ${item.change > 0 ? '+' : ''}${item.change.toFixed(1)}%<br>
              <small>Prob: ${75 + Math.floor(Math.random()*20)}%</small>
            </div>
          </div>`;
      });
      content.innerHTML = html;
    }

    // Carrega automaticamente ao abrir
    window.onload = loadData;
  </script>
</body>
</html>
