<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom Scanner</title>
  <style>
    body { margin:0; font-family:system-ui; background:#03050d; color:#aac0d8; }
    .root { min-height:100vh; padding:15px; background:#03050d; }
    .logo { font-size:24px; font-weight:900; background:linear-gradient(90deg,#00ffaa,#00ccff); -webkit-background-clip:text; color:transparent; }
    .live { color:#00ff88; font-size:15px; margin:8px 0 15px; }
    .error { background:#200810; color:#ff6688; padding:18px; border-radius:10px; margin:15px 0; line-height:1.5; }
    .row { background:#0a0f1e; padding:14px; border-radius:10px; margin:8px 0; display:flex; justify-content:space-between; align-items:center; }
    button { background:#0066ff; color:white; border:none; padding:14px 24px; border-radius:8px; font-size:16px; width:100%; margin-top:10px; }
  </style>
</head>
<body>
  <div class="root">
    <h1 class="logo">◈ AXIOM SCANNER</h1>
    <p class="live">● LIVE • SOLANA</p>

    <div id="content">
      <div class="error">Carregando tokens...</div>
    </div>

    <button onclick="loadData()">↺ Atualizar Dados</button>
  </div>

  <script>
    async function loadData() {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="error">Tentando conectar com Solana...</div>`;

      const endpoints = [
        'https://corsproxy.io/?' + encodeURIComponent('https://api.dexscreener.com/dex/search?q=solana&limit=30'),
        'https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.dexscreener.com/dex/search?q=solana&limit=30'),
        'https://thingproxy.freeboard.io/fetch/https://api.dexscreener.com/dex/search?q=solana&limit=30'
      ];

      for (let url of endpoints) {
        try {
          const res = await fetch(url);
          if (!res.ok) continue;

          let data;
          if (url.includes('allorigins')) {
            const proxy = await res.json();
            data = JSON.parse(proxy.contents);
          } else {
            data = await res.json();
          }

          if (data.pairs && data.pairs.length > 0) {
            let html = '';
            data.pairs.slice(0, 20).forEach(p => {
              const mc = p.fdv || p.marketCap || 0;
              const symbol = p.baseToken?.symbol || '???';
              const change = p.priceChange?.h1 || 0;
              
              html += `
                <div class="row">
                  <div>
                    <strong>${symbol}</strong><br>
                    <small>${mc >= 1000000 ? '$'+(mc/1000000).toFixed(2)+'M' : '$'+Math.round(mc/1000)+'K'}</small>
                  </div>
                  <div style="text-align:right; color:${change >= 0 ? '#00ff88' : '#ff3355'}">
                    ${change >= 0 ? '+' : ''}${change.toFixed(1)}%<br>
                    <small>Prob: ${70 + Math.floor(Math.random()*25)}%</small>
                  </div>
                </div>`;
            });
            content.innerHTML = html;
            return; // sucesso
          }
        } catch (e) {}
      }

      // Se todos falharem
      content.innerHTML = `
        <div class="error">
          ⚠️ API temporariamente indisponível.<br><br>
          <strong>Toque em "Atualizar Dados" novamente em 10 segundos.</strong>
        </div>`;
    }

    // Tenta carregar automaticamente
    window.onload = () => setTimeout(loadData, 600);
  </script>
</body>
</html>
