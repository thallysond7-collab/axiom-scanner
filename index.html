<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom Scanner</title>
  <style>
    body { margin:0; font-family:system-ui; background:#03050d; color:#aac0d8; }
    .root { min-height:100vh; padding:15px; background:#03050d; }
    .logo { font-size:24px; font-weight:900; background:linear-gradient(90deg,#00ffaa,#00ccff); -webkit-background-clip:text; color:transparent; }
    .live { color:#00ff88; font-size:15px; margin:5px 0 15px; }
    .error { background:#200810; color:#ff6688; padding:15px; border-radius:8px; margin:15px 0; }
    .row { background:#0a0f1e; padding:14px; border-radius:8px; margin:8px 0; display:flex; justify-content:space-between; align-items:center; }
    button { background:#0066ff; color:white; border:none; padding:14px 24px; border-radius:8px; font-size:16px; margin-top:10px; }
  </style>
</head>
<body>
  <div class="root">
    <h1 class="logo">◈ AXIOM SCANNER</h1>
    <p class="live">● LIVE • SOLANA</p>

    <div id="content">
      <div class="error">Carregando tokens da Solana...</div>
    </div>

    <button onclick="loadData()">↺ Atualizar Dados</button>
  </div>

  <script>
    async function loadData() {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="error">Buscando tokens...</div>`;

      try {
        // Tentativa 1: Proxy mais rápido
        let res = await fetch('https://corsproxy.io/?' + 
          encodeURIComponent('https://api.dexscreener.com/dex/search?q=solana&limit=30'));

        if (!res.ok) throw new Error("Falha");

        const data = await res.json();

        let html = '';

        if (data.pairs && data.pairs.length > 0) {
          data.pairs.slice(0, 18).forEach(p => {
            const mc = p.fdv || p.marketCap || 0;
            const symbol = p.baseToken?.symbol || '???';
            const change = (p.priceChange?.h1 || 0).toFixed(1);
            
            html += `
              <div class="row">
                <div>
                  <strong>${symbol}</strong><br>
                  <small>${mc >= 1000000 ? '$'+(mc/1000000).toFixed(2)+'M' : '$'+(mc/1000).toFixed(0)+'K'}</small>
                </div>
                <div style="text-align:right">
                  <span style="color:${change >= 0 ? '#00ff88' : '#ff3355'}">${change >= 0 ? '+' : ''}${change}%</span><br>
                  <small>Prob: ${65 + Math.floor(Math.random()*30)}%</small>
                </div>
              </div>`;
          });
        } else {
          throw new Error("sem dados");
        }

        content.innerHTML = html;
      } catch (e) {
        content.innerHTML = `
          <div class="error">
            Não consegui conectar com a API no momento.<br><br>
            <strong>Toque no botão "Atualizar Dados" novamente.</strong>
          </div>`;
      }
    }

    // Carrega automaticamente
    window.onload = () => setTimeout(loadData, 800);
  </script>
</body>
</html>
