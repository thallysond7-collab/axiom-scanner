<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axiom Scanner PRO</title>

<style>
:root { --lime:#a3e635; --bg:#0a0f0a; --card:#11170f; }

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:#e0f2e0;
}

.root { padding:15px; }

.logo { font-size:26px; font-weight:900; color:var(--lime); }
.live { color:var(--lime); }

.box {
  background:#1a231a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.row {
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}

.ca { font-size:11px; color:#889988; }

.score {
  font-size:13px;
  margin-top:5px;
  color:#9ccc9c;
}

.explain {
  font-size:12px;
  margin-top:5px;
  color:#6f8f6f;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:var(--lime);
  font-weight:700;
}
</style>
</head>

<body>
<div class="root">

<div style="display:flex; justify-content:space-between;">
  <div class="logo">◈ AXIOM PRO</div>
  <div class="live">● LIVE</div>
</div>

<div class="box">
🧠 <b>Como a IA calcula:</b><br>
• MC baixo = mais chance<br>
• Volume alto = força<br>
• Pump recente = tendência<br>
• Score final = probabilidade de explosão 🚀
</div>

<div id="content">Carregando mercado...</div>

<button onclick="load()">Atualizar</button>

</div>

<script>

const proxies = [
  "https://corsproxy.io/?",
  "https://api.codetabs.com/v1/proxy?quest=",
  "https://api.allorigins.win/raw?url="
];

const API = "https://api.dexscreener.com/dex/search?q=solana";

async function getData() {
  for (let p of proxies) {
    try {
      let res = await fetch(p + encodeURIComponent(API));
      if (res.ok) return await res.json();
    } catch {}
  }
  throw "erro";
}

function calcScore(p) {
  let mc = p.fdv || 0;
  let vol = p.volume?.h1 || 0;
  let change = p.priceChange?.h1 || 0;

  let score = 0;

  if (mc < 300000) score += 40;
  else if (mc < 800000) score += 25;
  else score += 10;

  if (vol > 50000) score += 30;
  else if (vol > 10000) score += 15;

  if (change > 5) score += 30;
  else if (change > 0) score += 15;

  return Math.min(score, 100);
}

function explain(p, score) {
  let mc = p.fdv || 0;
  let vol = p.volume?.h1 || 0;
  let change = p.priceChange?.h1 || 0;

  return `
  MC: ${Math.round(mc/1000)}K |
  Vol: ${Math.round(vol)} |
  Trend: ${change.toFixed(1)}% |
  Score: ${score}%
  `;
}

async function load() {
  const el = document.getElementById("content");
  el.innerHTML = "Buscando dados reais...";

  try {
    const data = await getData();

    let html = "";

    data.pairs.slice(0,20).forEach(p => {

      let score = calcScore(p);
      let symbol = p.baseToken?.symbol || "???";
      let ca = p.baseToken?.address || "";
      let change = p.priceChange?.h1 || 0;

      html += `
      <div class="row">
        <div>
          <b>${symbol}</b><br>
          <div class="ca">${ca.slice(0,10)}...</div>
          <div class="explain">${explain(p, score)}</div>
        </div>

        <div style="text-align:right;color:${score>60?'#a3e635':'#ff6655'}">
          ${score}%<br>
          <div class="score">Prob 🚀</div>
        </div>
      </div>
      `;
    });

    el.innerHTML = html;

  } catch {
    el.innerHTML = `
    <div style="color:#ff7777">
    ❌ Falha ao acessar API<br>
    Isso é limitação do celular + CORS<br><br>
    💡 solução real: backend (te ensino se quiser)
    </div>`;
  }
}

setInterval(load, 20000);
load();

</script>

</body>
</html>
