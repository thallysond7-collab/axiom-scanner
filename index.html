<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axiom Scanner Mobile</title>

<style>
body { margin:0; font-family:system-ui; background:#0a0f0a; color:#e0f2e0; }
.root { padding:15px; }
.logo { font-size:24px; font-weight:900; color:#a3e635; }
.row { background:#11170f; padding:12px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; }
.small { font-size:11px; color:#889988; }
.good { color:#a3e635; }
.bad { color:#ff6655; }
</style>
</head>

<body>
<div class="root">

<div class="logo">◈ AXIOM MOBILE</div>
<div id="status">Conectando mercado...</div>

<div id="list"></div>

</div>

<script>

const proxies = [
  "https://corsproxy.io/?",
  "https://api.codetabs.com/v1/proxy?quest=",
  "https://api.allorigins.win/raw?url="
];

const API = "https://api.dexscreener.com/latest/dex/pairs/solana";

async function fetchData() {
  for (let p of proxies) {
    try {
      let res = await fetch(p + encodeURIComponent(API));
      if (res.ok) return await res.json();
    } catch {}
  }
  return null;
}

function calcScore(p) {
  let mc = p.fdv || 0;
  let vol = p.volume?.h24 || 0;
  let change = p.priceChange?.h1 || 0;

  let score = 0;

  if (mc < 300000) score += 40;
  else if (mc < 800000) score += 25;
  else score += 10;

  if (vol > 100000) score += 30;
  else if (vol > 20000) score += 15;

  if (change > 5) score += 30;
  else if (change > 0) score += 15;

  return Math.min(score, 100);
}

async function load() {
  const status = document.getElementById("status");
  const list = document.getElementById("list");

  status.innerText = "Buscando moedas reais...";

  const data = await fetchData();

  if (!data || !data.pairs) {
    status.innerText = "❌ Falha (bloqueio de API no celular)";
    return;
  }

  status.innerText = "✅ Conectado";

  let html = "";

  data.pairs.slice(0, 20).forEach(p => {

    let score = calcScore(p);
    let symbol = p.baseToken?.symbol || "???";
    let change = p.priceChange?.h1 || 0;
    let mc = p.fdv || 0;

    html += `
    <div class="row">
      <div>
        <b>${symbol}</b><br>
        <span class="small">MC: ${Math.round(mc/1000)}K</span><br>
        <span class="small">Trend: ${change.toFixed(1)}%</span>
      </div>

      <div class="${score>60?'good':'bad'}">
        ${score}%<br>
        <span class="small">Prob 🚀</span>
      </div>
    </div>
    `;
  });

  list.innerHTML = html;
}

setInterval(load, 20000);
load();

</script>
</body>
</html>
